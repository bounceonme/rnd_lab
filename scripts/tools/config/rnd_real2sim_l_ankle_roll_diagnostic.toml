# L ankle-roll diagnostic derived from rnd_real2sim.toml.
# Only the micro-triangle amplitude and preconditioning count differ from the
# standard experiment. Do not use this file as the default 12-joint baseline.

[experiment]
sample_hz = 50.0
initial_settle_s = 1.0
inter_profile_settle_s = 0.5
return_duration_s = 1.0

[reference_pose]
move_speed_deg_s = 8.0
settle_s = 3.0
tolerance_deg = 1.5
max_start_deviation_deg = 75.0
max_tracking_error_deg = 5.0
max_current_a = 1.0
max_pwm_fraction = 0.50

[reference_pose.positions_deg]
R_Leg_hip_yaw = 0.0
R_Leg_hip_roll = 5.729578
R_Leg_hip_pitch = -36.096341
R_Leg_knee = 8.594367
R_Leg_ankle_pitch = -52.139159
R_Leg_ankle_roll = -5.729578
L_Leg_hip_yaw = 0.0
L_Leg_hip_roll = -5.729578
L_Leg_hip_pitch = 36.096341
L_Leg_knee = -8.594367
L_Leg_ankle_pitch = 52.139159
L_Leg_ankle_roll = 5.729578

[safety]
max_goal_step_deg = 1.0
max_excursion_deg = 10.0
position_limit_margin_deg = 2.0
max_tracking_error_deg = 12.0
max_current_a = 2.0
max_pwm_fraction = 0.80
max_temperature_c = 55.0
min_voltage_v = 10.5
max_voltage_v = 14.5
max_consecutive_deadline_misses = 20

[identification]
max_delay_ms = 150.0
motion_threshold_deg = 0.18
velocity_threshold_deg_s = 1.0
backlash_velocity_threshold_deg_s = 0.10
min_reversal_events = 6
validation_fraction = 0.25
nominal_torque_per_amp_nm = 1.615
randomization_margin = 0.25

[[profiles]]
name = "micro_triangle"
waveform = "triangle"
amplitude_deg = 3.0
frequency_hz = 0.10
cycles = 6
precondition_cycles = 2

[[profiles]]
name = "slow_sine"
waveform = "sine"
amplitude_deg = 5.0
frequency_hz = 0.20
cycles = 4

[[profiles]]
name = "medium_sine"
waveform = "sine"
amplitude_deg = 10.0
frequency_hz = 0.50
cycles = 5
